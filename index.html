<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>

<div id="login-screen" class="screen active">
    <div class="login-box glass">
        <div class="logo">
            <span></span>
            <h1>AI<span class="blue">Chatbot</span></h1>
        </div>
        <p class="sub">by @Jainammaru</p>

        <form id="login-form">
            <div class="field">
                <label>Your Name</label>
                <input type="text" id="nickname" placeholder="Enter your name" maxlength="30" autocomplete="off" required>
            </div>
            <button type="submit">Enter Chat</button>
        </form>
    </div>
</div>

<div id="chat-screen" class="screen">

    <div id="sidebar">
        <div class="side-top">
            <span></span>
            <span class="side-title">AI<span class="blue">Chatbot</span></span>
        </div>

        <div id="user-info"></div>

        <div class="side-btns">
            <button id="btn-clear">Clear</button>
            <button id="btn-help">Help</button>
            <button id="btn-leave">Leave</button>
        </div>

        <div class="contact-me">
            <span class="contact-title">Contact Me</span>
            <div class="contact-links">
                <a href="https://www.instagram.com/jainammaru_/" target="_blank" title="Instagram">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.308.975.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.334 2.633-1.308 3.608-.975.975-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.334-3.608-1.308-.975-.975-1.246-2.242-1.308-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.334-2.633 1.308-3.608.975-.975 2.242-1.246 3.608-1.308C8.416 2.175 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.332.014 7.052.072 5.197.157 3.355.673 2.014 2.014.673 3.355.157 5.197.072 7.052.014 8.332 0 8.741 0 12c0 3.259.014 3.668.072 4.948.085 1.855.601 3.697 1.942 5.038 1.341 1.341 3.183 1.857 5.038 1.942C8.332 23.986 8.741 24 12 24s3.668-.014 4.948-.072c1.855-.085 3.697-.601 5.038-1.942 1.341-1.341 1.857-3.183 1.942-5.038.058-1.28.072-1.689.072-4.948s-.014-3.668-.072-4.948c-.085-1.855-.601-3.697-1.942-5.038C20.645.673 18.803.157 16.948.072 15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
                    Instagram
                </a>
                <a href="https://github.com/dev9269" target="_blank" title="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
                    GitHub
                </a>
                <a href="https://www.linkedin.com/in/jainam-maru-007803386/" target="_blank" title="LinkedIn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    LinkedIn
                </a>
            </div>
        </div>

        <div class="side-bottom">
            <label class="toggle-wrap">
                <input type="checkbox" id="theme-toggle">
                <div class="toggle-track">
                    <div class="toggle-thumb"></div>
                </div>
                <span>Light Mode</span>
            </label>
        </div>
    </div>

    <div id="main">
        <div id="topbar">
            <button id="menu-btn" title="Menu">Menu</button>
            <div id="status">
                <div class="dot"></div>
                <span>AI Online</span>
            </div>
            <button id="clear-btn2" title="Clear chat">Clear</button>
        </div>

        <div id="messages"></div>

        <div id="typing" class="hidden">
            <div class="typing-box">
                <span class="b"></span>
                <span class="b"></span>
                <span class="b"></span>
                <span>AI is thinking...</span>
            </div>
        </div>

        <div id="input-area">
            <div id="input-row">
                <textarea id="msg-box" placeholder="Type something..." maxlength="2000" rows="1"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div id="input-footer">
                <span id="char-count">0 / 2000</span>
                <span>use <code>/help</code> for commands</span>
            </div>
        </div>
    </div>

</div>

<div id="img-modal" class="hidden">
    <div id="modal-bg"></div>
    <div id="modal-box">
        <img id="modal-img" src="" alt="">
        <div id="modal-btns">
            <a id="modal-dl" href="#" download>Download</a>
            <button id="modal-close">Close</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
